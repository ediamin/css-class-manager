name: Tests

on:
  push:
    branches:
      - main
      - trunk
  pull_request:
    branches:
      - main
      - trunk

# Restrict the default GITHUB_TOKEN to read-only for all jobs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # PHP unit & integration tests (no wp-env / Docker)
  # ---------------------------------------------------------------------------
  php:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.3', '8.4']
        include:
          - php: '8.4'
            coverage: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-downloads-${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: composer-downloads-${{ runner.os }}-php-${{ matrix.php }}-

      - name: Cache Composer vendor directory
        id: composer-vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-vendor-${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.json', 'composer.lock') }}

      - name: Install Composer dependencies
        if: steps.composer-vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist

      - name: Download WordPress
        run: curl -sL https://wordpress.org/latest.tar.gz | tar xz -C /tmp

      - name: Create wp-tests-config.php
        run: |
          cat > /tmp/wp-tests-config.php << 'PHP'
          <?php
          define( 'DB_NAME', 'wordpress_tests' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );

          $table_prefix = 'wptests_';

          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'CSS Class Manager for WordPress Blocks' );
          define( 'WP_PHP_BINARY', 'php' );

          define( 'ABSPATH', '/tmp/wordpress/' );
          PHP

      - name: Create stub asset file
        run: |
          mkdir -p assets/dist/css-class-manager
          echo "<?php return ['dependencies' => [], 'version' => 'test'];" > assets/dist/css-class-manager/index.asset.php

      - name: Run PHP tests
        env:
          WP_PHPUNIT__DIR: ${{ github.workspace }}/vendor/wp-phpunit/wp-phpunit
          WP_PHPUNIT__TESTS_CONFIG: /tmp/wp-tests-config.php
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            vendor/bin/phpunit -c phpunit.xml.dist --coverage-clover coverage.xml --verbose
          else
            vendor/bin/phpunit -c phpunit.xml.dist --no-coverage --verbose
          fi

      - name: Upload PHP coverage report (Clover)
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage-clover
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload PHP coverage report (HTML)
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage-html
          path: coverage/php
          if-no-files-found: warn

      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: php-junit-results-${{ matrix.php }}
          path: junit.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # JavaScript unit tests with coverage
  # ---------------------------------------------------------------------------
  js:
    name: JavaScript Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package.json', 'package-lock.json') }}

      - name: Install npm dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run JavaScript unit tests with coverage
        run: npm run test:js:coverage

      - name: Upload JS coverage report
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage/js
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Playwright E2E tests (no wp-env / Docker)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      WP_BASE_URL: http://localhost:8889

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer, wp-cli

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-downloads-${{ runner.os }}-e2e-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: composer-downloads-${{ runner.os }}-e2e-

      - name: Cache Composer vendor directory
        id: composer-vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-vendor-${{ runner.os }}-e2e-${{ hashFiles('composer.json', 'composer.lock') }}

      - name: Install Composer dependencies (production only)
        if: steps.composer-vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('.nvmrc', 'package.json', 'package-lock.json') }}

      - name: Install npm dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build assets
        run: npm run build

      - name: Set up WordPress
        run: |
          # Download WordPress core
          wp core download --path=/tmp/wordpress

          # Configure database connection
          wp config create --path=/tmp/wordpress \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1

          # Install WordPress
          wp core install --path=/tmp/wordpress \
            --url="$WP_BASE_URL" \
            --title="CSS Class Manager Tests" \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=admin@example.org \
            --skip-email

          # Enable debug mode
          wp config set WP_DEBUG true --raw --path=/tmp/wordpress
          wp config set WP_DEBUG_LOG true --raw --path=/tmp/wordpress

          # Symlink the plugin into the WordPress plugins directory
          ln -s "$GITHUB_WORKSPACE" /tmp/wordpress/wp-content/plugins/css-class-manager

          # Activate the plugin
          wp plugin activate css-class-manager --path=/tmp/wordpress

          # Install and activate the theme used by E2E tests
          wp theme install twentytwentyfive --activate --path=/tmp/wordpress

          # Set up pretty permalinks for REST API support
          wp rewrite structure '/%postname%/' --path=/tmp/wordpress
          wp rewrite flush --path=/tmp/wordpress

      - name: Create PHP router for built-in server
        run: |
          cat > /tmp/wordpress/router.php << 'ROUTER'
          <?php
          $uri = urldecode( parse_url( $_SERVER['REQUEST_URI'], PHP_URL_PATH ) );

          if ( $uri !== '/' && file_exists( $_SERVER['DOCUMENT_ROOT'] . $uri ) ) {
              return false;
          }

          $_SERVER['PHP_SELF'] = '/index.php';
          require $_SERVER['DOCUMENT_ROOT'] . '/index.php';
          ROUTER

      - name: Start WordPress
        run: |
          PHP_CLI_SERVER_WORKERS=4 php -S localhost:8889 -t /tmp/wordpress /tmp/wordpress/router.php > /tmp/wordpress/php-server.log 2>&1 &
          echo $! > /tmp/wordpress/php-server.pid

      - name: Wait for WordPress
        run: |
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null "$WP_BASE_URL/wp-login.php" 2>/dev/null; then
              echo "WordPress is ready"
              exit 0
            fi
            sleep 1
          done
          echo "WordPress failed to start"
          exit 1

      - name: Run E2E tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'true'
        run: npm run test:e2e

      - name: Upload PHP server log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: php-server-log
          path: /tmp/wordpress/php-server.log
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload E2E JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-results
          path: e2e-results.xml
          if-no-files-found: warn
